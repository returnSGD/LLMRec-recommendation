# ============================================================
# LLM-Rec — RTX PRO 6000 96GB Optimized Configuration
# Cross-dataset validation: Goodreads (25.8M train samples)
#
# GPU: RTX PRO 6000 Blackwell, 96GB VRAM
# CPU: 22-core Xeon Platinum 8470Q
# RAM: 110GB
# CUDA: 13.0 | PyTorch: 2.8.0
#
# Memory budget (flan-t5-base, bf16, bs=72):
#   Model weights:     ~0.5 GB
#   Optimizer (Adam):  ~1.5 GB
#   Activations:       ~15 GB  (seq_len=512, bs=72, bf16)
#   Emb cache:         ~4 GB   (200K items × 768d)
#   SANS/RecAug headroom: ~15 GB
#   CUDA context/etc:  ~8 GB
#   Total:             ~44 GB  (peak ~65-70GB with full mode, well within 96GB)
# ============================================================

# --- Paths ---
data:
  raw_dir: "data/"
  processed_dir: "data/goodreads_processed/"
  cache_dir: "data/cache_goodreads/"

# --- Model ---
model:
  base_model: "google/flan-t5-base"
  max_seq_length: 512
  max_output_length: 128
  use_lora: false
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.1

# --- Prompt template (book-specific) ---
prompt:
  template: >
    The user has read the following books in order:
    {item_sequence}

    Considering the user's reading preferences and patterns,
    what book should be recommended next? Answer with the book title only.

# --- Training (RTX PRO 6000 96GB optimized) ---
# Effective batch size = 72 × 8 = 576
# Steps per epoch: 25.8M / 576 ≈ 44,792
# Memory: bs=72 keeps peak ~65GB (base) / ~70GB (full), well within 96GB
training:
  batch_size: 72
  gradient_accumulation_steps: 8
  epochs: 3
  learning_rate: 3.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true                           # Blackwell-native, no overflow (same exponent as fp32)
  fp16: false                          # fp16 overflows on CUDA 13.0 + PyTorch 2.8.0
  seed: 42
  eval_steps: 10000
  save_steps: 20000
  logging_steps: 50

# --- RecCL: Curriculum Learning ---
rec_cl:
  enable: true
  seq_difficulty_weight: 0.33
  item_difficulty_weight: 0.33
  pred_difficulty_weight: 0.34
  warmup_ratio: 0.3
  transition_type: "linear"

# --- SANS: Semantic-Aware Negative Sampling ---
# With effective bs=512, scale negative counts proportionally
sans:
  enable: true
  easy_neg_count: 12
  medium_neg_count: 6
  hard_neg_count: 6
  easy_weight: 0.1
  medium_weight: 0.3
  hard_weight: 0.6
  temperature: 0.07
  hard_neg_k: 5
  hard_neg_offset: 3

# --- RecAug: Recommendation-Specific Augmentation ---
rec_aug:
  enable: true
  aug_count: 2
  consistency_lambda: 0.1
  intent_truncation_ratio: 0.3
  session_gap_hours: 72
  substitution_prob: 0.2

# --- LLM API (DeepSeek) ---
llm_api:
  provider: "deepseek"
  base_url: "https://api.deepseek.com/anthropic"
  api_key: ""
  model: "deepseek-chat"
  max_tokens: 512
  temperature: 0.7
  request_interval: 1.0

# --- Data Preprocessing ---
preprocess:
  k_core: 5
  min_seq_len: 5
  max_seq_len: 50
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  min_playtime: 0.0

# --- Evaluation ---
eval:
  top_k: [5, 10, 20]
  tail_threshold: 50
  ood_check: true
